<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pick Focus Area</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: crosshair;
        user-select: none;
      }

      body {
        background: rgba(0, 0, 0, 0.25);
      }

      .hint {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 12px;
      }

      #selection {
        position: fixed;
        border: 2px solid #7dd3fc;
        background: rgba(125, 211, 252, 0.2);
        display: none;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="hint">Drag to select focus area • Enter to confirm • Esc to cancel</div>
    <div id="selection"></div>

    <script>
      const selectionEl = document.getElementById('selection');
      let dragging = false;
      let startX = 0;
      let startY = 0;
      let currentRect = null;

      function updateSelection(x1, y1, x2, y2) {
        const left = Math.min(x1, x2);
        const top = Math.min(y1, y2);
        const width = Math.abs(x2 - x1);
        const height = Math.abs(y2 - y1);

        currentRect = { left, top, width, height };
        selectionEl.style.left = `${left}px`;
        selectionEl.style.top = `${top}px`;
        selectionEl.style.width = `${width}px`;
        selectionEl.style.height = `${height}px`;
        selectionEl.style.display = 'block';
      }

      function completeIfValid() {
        if (!currentRect || currentRect.width < 5 || currentRect.height < 5) {
          window.focusPickerAPI.cancel();
          return;
        }

        const absoluteLeft = Math.round(window.screenX + currentRect.left);
        const absoluteTop = Math.round(window.screenY + currentRect.top);

        window.focusPickerAPI.complete({
          left: absoluteLeft,
          top: absoluteTop,
          width: Math.round(currentRect.width),
          height: Math.round(currentRect.height)
        });
      }

      window.addEventListener('mousedown', (event) => {
        if (event.button !== 0) {
          return;
        }
        dragging = true;
        startX = event.clientX;
        startY = event.clientY;
        updateSelection(startX, startY, startX, startY);
      });

      window.addEventListener('mousemove', (event) => {
        if (!dragging) {
          return;
        }
        updateSelection(startX, startY, event.clientX, event.clientY);
      });

      window.addEventListener('mouseup', (event) => {
        if (!dragging || event.button !== 0) {
          return;
        }
        dragging = false;
        updateSelection(startX, startY, event.clientX, event.clientY);
      });

      window.addEventListener('dblclick', () => {
        completeIfValid();
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          window.focusPickerAPI.cancel();
          return;
        }

        if (event.key === 'Enter') {
          completeIfValid();
        }
      });
    </script>
  </body>
</html>
