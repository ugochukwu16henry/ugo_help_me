<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UGO Ghost Overlay</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        font-family: Arial, sans-serif;
        color: #fff;
        background: transparent;
      }

      body.interactive {
        pointer-events: auto;
      }

      .overlay {
        margin: 14px;
        padding: 12px 14px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .status {
        font-size: 11px;
        opacity: 0.8;
        margin-bottom: 6px;
      }

      .hint {
        font-size: 11px;
        opacity: 0.8;
        margin-bottom: 8px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .controls input,
      .controls select,
      .controls button {
        pointer-events: auto;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        border-radius: 6px;
        padding: 4px 6px;
        font-size: 12px;
      }

      .controls button {
        cursor: pointer;
      }

      .controls label {
        font-size: 11px;
        opacity: 0.9;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .answer {
        font-size: 14px;
        line-height: 1.35;
        white-space: pre-wrap;
        max-height: 120px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div id="status" class="status">Connecting to backend...</div>
      <div id="hint" class="hint">Press Ctrl+Shift+I to unlock controls.</div>
      <div class="controls">
        <button id="toggleInteractionBtn">Unlock</button>
        <button id="startBtn">Start Ingestion</button>
        <button id="stopBtn">Stop Ingestion</button>

        <label>Mode
          <select id="modeSelect">
            <option value="center">center</option>
            <option value="full">full</option>
            <option value="custom">custom</option>
          </select>
        </label>

        <label>Monitor
          <input id="monitorInput" type="number" value="1" min="1" style="width:50px" />
        </label>

        <label>Ratio
          <input id="ratioInput" type="number" value="0.6" min="0.1" max="1" step="0.1" style="width:60px" />
        </label>

        <label>L
          <input id="leftInput" type="number" value="100" min="0" style="width:70px" />
        </label>
        <label>T
          <input id="topInput" type="number" value="80" min="0" style="width:70px" />
        </label>
        <label>W
          <input id="widthInput" type="number" value="800" min="1" style="width:70px" />
        </label>
        <label>H
          <input id="heightInput" type="number" value="500" min="1" style="width:70px" />
        </label>

        <button id="applyFocusBtn">Apply Focus</button>
      </div>
      <div id="answer" class="answer">Waiting for generated response...</div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
